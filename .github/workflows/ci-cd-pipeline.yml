name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vote image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/vote:latest ./vote
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/vote:latest

      - name: Build and push result image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/result:latest ./result
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/result:latest

      - name: Build and push worker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/worker:latest ./worker
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/worker:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region eu-central-1 --name voting-app-cluster

      - name: Deploy to EKS
        run: kubectl apply -f K8s/
